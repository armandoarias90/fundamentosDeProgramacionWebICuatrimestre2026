<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <!-- ajusta el contenido de pantalla en celular -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secret Garden - Login</title>
    <!-- carga del framework CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" href="img/secretGardenFavicon.png">
    <link rel="stylesheet" href="css/estilos.css">
  </head>
  <body>

    <section class="container-fluid fondoLogin">
      <div class="row justify-content-around">

        <div class="col-sm-4 col-md-4 col-lg-4"></div>

        <div class="col-sm-5 col-md-5 col-lg-5 formularioLogin">
          <form method="post">
            <fieldset>
              <legend><h2 class="tituloFormLogin">Identificación</h2></legend>
              <div class="centrado">            
                <div class="centrado bajar3">
                  <label class="tituloLabelLogin py-2" for="in-txt-user">Usuario:</label>
                  <input class="form-control mb-3" id="in-txt-user" type="text" placeholder="Ingrese su usuario">
                </div>

                <div class="centrado bajar3">
                  <label class="tituloLabelLogin py-2" for="in-txt-pass">Contraseña:</label>
                  <input class="form-control mb-4" id="in-txt-pass" type="password" placeholder="Ingrese su contraseña">
                </div>

                <div class="text-center bajar2">
                  <a class="btn btn-primary botonLogin my-3 cursor" id="btn-login">Iniciar</a>
                </div>
              </div><br><br>     
            </fieldset>
          </form>
        </div>

      </div>
    </section>

    <!-- carga la interactividad JS en Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.13/lottie.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@0.3.0/dist/lottie-player.js"></script>
    <script src="js/login.js"></script>

  </body>
</html>
